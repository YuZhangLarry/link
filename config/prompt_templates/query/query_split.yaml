# Query拆分提示词模板
templates:
  - id: "query_split"
    name: "Query拆分格式"
    description: "将复杂查询拆分为多个简单的子查询"
    content: |
      ## 历史对话背景
      以下是用户与助手的对话历史，请仔细阅读以理解上下文：

      {{conversation}}

      ## 当前用户问题
      {{query}}

      ## 任务要求
      请分析用户的复杂查询，将其拆分为多个简单、独立的子查询。
      每个子查询应该能够单独执行，并且合起来能够回答原问题。

      ### 拆分原则
      1. **独立性**: 每个子查询应该是一个独立的、完整的问题
      2. **简单性**: 子查询应该简单明确，易于理解
      3. **完整性**: 所有子查询的并集应该覆盖原问题的所有方面
      4. **可执行性**: 每个子查询都应该能够独立检索相关信息
      5. **优先级**: 按照逻辑顺序和重要性排序子查询
      6. **最小化**: 在保证完整性的前提下，尽量减少子查询的数量

      ### 常见拆分场景
      - **多概念问题**: "什么是RAG和向量数据库" → "什么是RAG", "什么是向量数据库"
      - **比较问题**: "Gin和Echo框架哪个更好" → "Gin框架的优势", "Echo框架的优势"
      - **列表问题**: "列出所有机器学习算法及其特点" → 为每个算法创建单独查询
      - **复杂技术问题**: "如何使用Go实现微服务架构" → "什么是Go微服务", "Go微服务的优势", "如何实现Go微服务"
      - **产品对比**: "云服务商AWS和Azure的区别" → "AWS的特点", "Azure的特点", "AWS和Azure的对比"

      ### 输出格式
      请按照以下JSON格式输出拆分结果：

      ```json
      {
        "sub_queries": [
          {
            "id": "query_1",
            "query": "子查询1",
            "description": "该子查询的目标和意义",
            "order": 1,
            "dependencies": ["query_2"]  // 可选：依赖的其他子查询ID
          },
          {
            "id": "query_2",
            "query": "子查询2",
            "description": "该子查询的目标和意义",
            "order": 2,
            "dependencies": []
          }
        ]
      }
      ```

      ## 执行步骤
      请按照以下步骤进行分析：
      1. **理解问题**: 分析用户问题的核心意图和所需信息
      2. **识别组成部分**: 识别问题中的多个概念或疑问点
      3. **确定关系**: 判断各部分之间的逻辑关系
      4. **设计子查询**: 为每个部分设计简单、独立的子查询
      5. **验证完整性**: 检查所有子查询合并后是否完整回答原问题
      6. **优化数量**: 合并相似或相关的子查询，减少总数

      ## 示例
      用户问题: "什么是RAG，它如何与向量数据库结合使用，请列出具体步骤"

      拆分结果:
      ```json
      {
        "sub_queries": [
          {
            "id": "query_1",
            "query": "什么是RAG",
            "description": "了解RAG的基本概念和定义",
            "order": 1
          },
          {
            "id": "query_2",
            "query": "RAG与向量数据库如何结合使用",
            "description": "了解RAG与向量数据库的集成方式",
            "order": 2
          },
          {
            "id": "query_3",
            "query": "RAG的具体实施步骤",
            "description": "了解如何在项目中实施RAG",
            "order": 3
          }
        ]
      }
      ```

      ## 注意事项
      - 子查询之间应该有明确的逻辑顺序
      - 每个子查询应该有明确的检索目的
      - 如果原问题已经很简单，则无需拆分
      - 避免拆分出过于碎片化的子查询

      ## 改写后的问题
      {{rewritten_query}}
