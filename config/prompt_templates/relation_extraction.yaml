# 关系提取提示词模板
templates:
  - id: "relation_extraction"
    name: "关系提取格式"
    description: "从文档中提取实体之间的关系（如依赖、包含、关联等）"
    content: |
      # 任务说明
      你是一个专业的知识图谱构建助手。请仔细阅读以下文档内容，提取其中实体之间的关系。

      # 已识别的实体列表
      {{entities}}

      # 文档内容
      {{document}}

      # 任务要求

      ## 关系类型
      请重点关注以下类型的关系：
      - **依赖关系**: A依赖于B（如 "Go语言依赖于C编译器"）
      - **包含关系**: A包含B（如 "API文档包含接口定义和示例"）
      - **关联关系**: A与B相关（如 "机器学习与数据分析密切相关"）
      - **使用关系**: A使用B（如 "Gin框架使用了Go语言的特性"）
      - **实现关系**: A实现了B（如 "该项目实现了RESTful API"）
      - **位于关系**: A位于B（如 "配置文件位于/etc目录"）
      - **前后关系**: A在B之前/之后
      - **因果关系**: A导致B
      - **其他关系**: contains（包含）、belongs（属于）、owns（拥有）等

      ## 关系类型映射
      请将识别的关系映射到以下标准类型：
      - 包含关系 → "contains"
      - 依赖关系 → "depends"
      - 关联关系 → "relates"
      - 从属关系 → "belongs"
      - 拥有关系 → "owns"
      - 其他关系 → "other"

      ## 提取要求
      1. **仅使用已识别的实体**：只从上方实体列表中提取关系，不要添加新实体
      2. **双向性**: 识别关系的方向（A→B）
      3. **置信度**: 评估关系的可信程度（0-1）
      4. **证据**: 提供关系存在的文本证据
      5. **关系强度**: 评估关系的重要性和紧密程度（1-10）

      # 输出格式要求

      **重要**：
      1. 只返回JSON格式，不要添加任何其他文字说明
      2. 不要使用markdown代码块标记（如```json）
      3. 确保返回的是有效的JSON格式
      4. 只返回relations数组，不要返回entities

      请严格按照以下JSON格式输出：

      {"relations":[{"id":"rel_1","source":"源实体名称（必须来自实体列表）","target":"目标实体名称（必须来自实体列表）","type":"关系类型","description":"关系的详细描述","strength":8.0,"weight":7.5}]}

      # 字段说明
      - **id**: 关系的唯一标识符，可以使用 "rel_1", "rel_2" 等
      - **source**: 源实体名称，必须来自上方实体列表
      - **target**: 目标实体名称，必须来自上方实体列表
      - **type**: 关系类型，从以下选择：contains、depends、relates、belongs、owns、other
      - **description**: 关系的详细描述
      - **strength**: 关系强度（1-10分），表示关系的重要性和紧密程度
      - **weight**: 关系权重（1-10分），综合考虑强度和置信度

      # 示例

      示例1：文档内容"Neo4j图数据库需要Go语言驱动才能在Go项目中使用"
      输出：{"relations":[{"id":"rel_1","source":"Neo4j","target":"Go驱动","type":"depends","description":"Neo4j需要Go驱动才能在Go项目使用","strength":9.0,"weight":8.5}]}

      示例2：文档内容"智能客服系统包含知识库管理、向量检索和图谱检索三个模块"
      输出：{"relations":[{"id":"rel_1","source":"智能客服系统","target":"知识库管理","type":"contains","description":"智能客服系统包含知识库管理模块","strength":10.0,"weight":9.5}]}

      # 注意事项
      - 只提取文档中明确表达的关系，避免推测
      - 如果关系不明确，降低strength和weight值
      - source和target必须来自已识别的实体列表
      - type必须是以下之一：contains、depends、relates、belongs、owns、other
      - 如果文档中没有明确的关系，请返回空数组：{"relations":[]}
      - 确保返回的是纯JSON格式，不要有任何前缀或后缀文字
